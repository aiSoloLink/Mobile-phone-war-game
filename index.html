<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>War Game — Stage 2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0b0f14; font-family: -apple-system, system-ui, sans-serif; color: #e8eef5; }
  #app { position: fixed; inset: 0; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .hidden { display: none !important; }

  h1 { font-size: 26px; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #9fb0c0; margin-bottom: 20px; max-width: 320px; line-height: 1.5; }

  input, select {
    width: 100%; max-width: 300px; padding: 14px; margin: 6px 0;
    font-size: 17px; border-radius: 12px; border: 1px solid #2a3542;
    background: #141c26; color: #fff; text-align: center;
  }
  input::placeholder { color: #5c6b7a; }

  .btn {
    width: 100%; max-width: 300px; padding: 16px; margin: 8px 0;
    font-size: 17px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer;
  }
  .btn-green { background: #16c60c; color: #001b00; }
  .btn-blue  { background: #2f81f7; color: #fff; }
  .btn-dim   { background: #232e3a; color: #cfd9e3; }
  .btn:disabled { opacity: 0.45; }

  #msg { margin-top: 14px; font-size: 14px; color: #ffd166; min-height: 20px; }

  /* Lobby */
  #roomCodeBig { font-size: 44px; font-weight: 800; letter-spacing: 10px; color: #16c60c; margin: 8px 0 2px; }
  #playerList { margin: 14px 0; font-size: 17px; line-height: 2; }
  .settingRow { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
  .settingRow label { font-size: 15px; color: #9fb0c0; }

  /* Game screen */
  #game { padding: 0; display: block; }
  video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #overlay { pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #ff2b2b; opacity: 0; pointer-events: none; transition: opacity 0.15s ease-out; }
  #flash.show { opacity: 0.55; transition: none; }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  #energyWrap { flex: 1; margin-right: 12px; }
  #energyLabel { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  #energyBar { height: 14px; border-radius: 8px; background: rgba(0,0,0,0.5); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
  #energyFill { height: 100%; width: 100%; background: linear-gradient(to right, #16c60c, #7ee81a); transition: width 0.3s; }
  #lockLabel { padding: 5px 12px; border-radius: 20px; background: rgba(0,0,0,0.45); font-size: 14px; font-weight: 700; }
  #lockLabel.locked { background: #16c60c; color: #001b00; }

  #centerMsg {
    position: absolute; top: 30%; left: 0; right: 0; z-index: 6;
    text-align: center; font-size: 58px; font-weight: 800; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.3s;
  }
  #centerMsg.show { opacity: 1; transition: none; }

  #shoot {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 7;
    width: 96px; height: 96px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #ff6b6b, #d31027);
    border: 5px solid rgba(255,255,255,0.85); box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    color: #fff; font-size: 17px; font-weight: 800; letter-spacing: 1px; cursor: pointer; user-select: none;
  }
  #shoot:active { transform: translateX(-50%) scale(0.92); }

  #endTitle { font-size: 42px; font-weight: 800; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home" class="screen">
    <h1>🔫 War Game</h1>
    <p class="sub">Your phone is the gun. Create a game and share the code, or join a friend's game.</p>
    <input id="nameInput" maxlength="12" placeholder="Your name" />
    <button id="createBtn" class="btn btn-green">Create Game</button>
    <input id="codeInput" maxlength="4" placeholder="4-letter code" style="text-transform:uppercase" />
    <button id="joinBtn" class="btn btn-blue">Join Game</button>
    <div id="msg"></div>
  </div>

  <!-- LOBBY -->
  <div id="lobby" class="screen hidden">
    <h1>Game Lobby</h1>
    <p class="sub">Share this code with the other player:</p>
    <div id="roomCodeBig">----</div>
    <div id="playerList"></div>
    <div class="settingRow" id="energySetting">
      <label>Hits to eliminate:</label>
      <select id="energySelect" style="width:90px">
        <option value="3">3</option>
        <option value="5" selected>5</option>
        <option value="10">10</option>
      </select>
    </div>
    <button id="readyBtn" class="btn btn-blue">Enable Camera (get ready)</button>
    <button id="startGameBtn" class="btn btn-green" disabled>Start Game</button>
    <div id="lobbyMsg" style="margin-top:10px;font-size:14px;color:#ffd166;min-height:20px;"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen hidden">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
    <div id="hud">
      <div id="energyWrap">
        <div id="energyLabel">ENERGY</div>
        <div id="energyBar"><div id="energyFill"></div></div>
      </div>
      <span id="lockLabel">Searching…</span>
    </div>
    <div id="centerMsg"></div>
    <button id="shoot">SHOOT</button>
  </div>

  <!-- END -->
  <div id="end" class="screen hidden">
    <div id="endTitle"></div>
    <p class="sub" id="endSub"></p>
    <button id="againBtn" class="btn btn-green">Back to Home</button>
  </div>

</div>

<!-- Firebase (free server) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<!-- On-device AI person detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCN0gXH8OlCrK1WgHZ3tx45gj8uQFaCfSg",
  authDomain: "iwar-game.firebaseapp.com",
  databaseURL: "https://iwar-game-default-rtdb.firebaseio.com",
  projectId: "iwar-game",
  storageBucket: "iwar-game.firebasestorage.app",
  messagingSenderId: "643951740494",
  appId: "1:643951740494:web:c8c6899189e7afbe6e251f"
};

(function () {
  const $ = (id) => document.getElementById(id);
  const screens = { home: $('home'), lobby: $('lobby'), game: $('game'), end: $('end') };
  function show(name) {
    for (const k in screens) screens[k].classList.toggle('hidden', k !== name);
  }

  if (firebaseConfig.apiKey === "PASTE_HERE") {
    $('msg').textContent = "⚠️ Server not configured yet — the Firebase config must be pasted into this file.";
    $('createBtn').disabled = true; $('joinBtn').disabled = true;
    return;
  }

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ---------- state ----------
  const myId = 'p_' + Math.random().toString(36).slice(2, 10);
  let myName = '';
  let roomCode = '';
  let isHost = false;
  let roomRef = null;
  let model = null;
  let cameraReady = false;
  let locked = false;
  let myEnergy = null;       // last known own energy (for damage detection)
  let maxEnergy = 5;
  let alivePlayers = {};     // id -> {name, energy}
  let gameOver = false;
  let audioCtx = null;

  // ---------- feedback helpers ----------
  function beep(freq, durMs, type) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.25, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durMs / 1000);
      o.start(); o.stop(audioCtx.currentTime + durMs / 1000);
    } catch (e) {}
  }
  function vibrate(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
  function centerMsg(text, color) {
    const el = $('centerMsg');
    el.textContent = text; el.style.color = color;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 600);
  }
  function redFlash() {
    $('flash').classList.add('show');
    setTimeout(() => $('flash').classList.remove('show'), 160);
  }

  // ---------- HOME ----------
  function makeCode() {
    const letters = 'ABCDEFGHJKMNPQRSTUVWXYZ';
    let c = '';
    for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
    return c;
  }

  $('createBtn').addEventListener('click', async () => {
    myName = $('nameInput').value.trim();
    if (!myName) { $('msg').textContent = 'Please enter your name first.'; return; }
    $('msg').textContent = 'Creating game…';
    try {
      roomCode = makeCode();
      isHost = true;
      roomRef = db.ref('rooms/' + roomCode);
      await withTimeout(roomRef.set({
        created: Date.now(),
        hostId: myId,
        status: 'lobby',
        settings: { energy: 5 },
        players: {}
      }));
      await joinRoom();
      $('msg').textContent = '';
    } catch (err) {
      $('msg').textContent = '❌ Could not reach the game server: ' + (err && err.message ? err.message : err);
    }
  });

  $('joinBtn').addEventListener('click', async () => {
    myName = $('nameInput').value.trim();
    const code = $('codeInput').value.trim().toUpperCase();
    if (!myName) { $('msg').textContent = 'Please enter your name first.'; return; }
    if (code.length !== 4) { $('msg').textContent = 'Enter the 4-letter game code.'; return; }
    $('msg').textContent = 'Joining game…';
    try {
      roomCode = code;
      isHost = false;
      roomRef = db.ref('rooms/' + roomCode);
      const snap = await withTimeout(roomRef.get());
      if (!snap.exists()) { $('msg').textContent = 'Game "' + code + '" not found.'; return; }
      if (snap.val().status !== 'lobby') { $('msg').textContent = 'That game already started.'; return; }
      await joinRoom();
      $('msg').textContent = '';
    } catch (err) {
      $('msg').textContent = '❌ Could not reach the game server: ' + (err && err.message ? err.message : err);
    }
  });

  // Fails fast (8s) instead of hanging forever when the server address is wrong
  function withTimeout(promise) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(
        () => reject(new Error('no response — check the databaseURL setting')), 8000))
    ]);
  }

  async function joinRoom() {
    await roomRef.child('players/' + myId).set({ name: myName, energy: -1, alive: true });
    roomRef.child('players/' + myId).onDisconnect().remove();
    $('roomCodeBig').textContent = roomCode;
    $('energySetting').style.display = isHost ? 'flex' : 'none';
    $('startGameBtn').style.display = isHost ? 'block' : 'none';
    show('lobby');
    listenToRoom();
    loadModel(); // preload AI while waiting in lobby
  }

  // ---------- LOBBY ----------
  $('energySelect').addEventListener('change', () => {
    if (isHost) roomRef.child('settings/energy').set(parseInt($('energySelect').value, 10));
  });

  $('readyBtn').addEventListener('click', async () => {
    $('readyBtn').disabled = true;
    $('lobbyMsg').textContent = 'Requesting camera…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      $('video').srcObject = stream;
      await $('video').play();
      cameraReady = true;
      $('readyBtn').textContent = '✅ Camera ready';
      $('lobbyMsg').textContent = model ? 'Ready! Waiting for game to start…' : 'Loading AI…';
      if (audioCtx === null) beep(1, 1, 'sine'); // unlock audio on user gesture
      updateStartButton();
    } catch (e) {
      $('lobbyMsg').textContent = '❌ Camera blocked — allow camera access and try again.';
      $('readyBtn').disabled = false;
    }
  });

  async function loadModel() {
    if (model) return;
    try {
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      if (cameraReady) $('lobbyMsg').textContent = 'Ready! Waiting for game to start…';
      updateStartButton();
    } catch (e) {
      $('lobbyMsg').textContent = '❌ AI failed to load — check internet, then reload.';
    }
  }

  let playerCount = 0;
  function updateStartButton() {
    if (isHost) $('startGameBtn').disabled = !(cameraReady && model && playerCount >= 2);
  }

  $('startGameBtn').addEventListener('click', async () => {
    const energy = parseInt($('energySelect').value, 10);
    const snap = await roomRef.child('players').get();
    const updates = { status: 'playing', 'settings/energy': energy };
    snap.forEach((p) => { updates['players/' + p.key + '/energy'] = energy; });
    await roomRef.update(updates);
  });

  // ---------- ROOM LISTENER ----------
  function listenToRoom() {
    roomRef.on('value', (snap) => {
      const room = snap.val();
      if (!room) return;
      maxEnergy = (room.settings && room.settings.energy) || 5;
      if (!isHost) { $('energySelect').value = String(maxEnergy); }

      // players
      alivePlayers = {};
      const names = [];
      playerCount = 0;
      for (const pid in (room.players || {})) {
        const p = room.players[pid];
        playerCount++;
        names.push((pid === room.hostId ? '👑 ' : '') + p.name + (pid === myId ? ' (you)' : ''));
        if (p.alive && p.energy !== 0) alivePlayers[pid] = p;
      }
      $('playerList').innerHTML = names.join('<br>');
      updateStartButton();

      // my energy → damage feedback
      const me = (room.players || {})[myId];
      if (me && room.status === 'playing') {
        if (myEnergy !== null && me.energy < myEnergy && me.energy >= 0) {
          redFlash(); vibrate([80, 40, 80]); beep(200, 200, 'sawtooth');
          centerMsg('-' + (myEnergy - me.energy) + ' HIT!', '#ff4d4d');
        }
        myEnergy = me.energy;
        const pct = Math.max(0, (me.energy / maxEnergy) * 100);
        $('energyFill').style.width = pct + '%';
        $('energyFill').style.background = pct > 40
          ? 'linear-gradient(to right,#16c60c,#7ee81a)'
          : 'linear-gradient(to right,#e8590c,#ff2b2b)';
      }

      // screen transitions
      if (room.status === 'playing' && !gameOver) {
        if (me && me.energy === 0) {
          endGame('☠️ ELIMINATED', 'You ran out of energy. Better luck next time!');
          return;
        }
        if (screens.game.classList.contains('hidden')) {
          show('game');
          resizeCanvas();
          detectLoop();
        }
        // am I the last one standing?
        const aliveIds = Object.keys(alivePlayers);
        if (aliveIds.length === 1 && aliveIds[0] === myId && playerCount >= 2) {
          endGame('🏆 YOU WIN!', 'You are the last player standing.');
        }
      }
    });
  }

  function endGame(title, sub) {
    gameOver = true;
    $('endTitle').textContent = title;
    $('endSub').textContent = sub;
    show('end');
    if (title.indexOf('WIN') >= 0) { beep(660, 150); setTimeout(() => beep(880, 250), 160); }
    else { vibrate([200, 100, 200]); beep(150, 500, 'sawtooth'); }
  }

  $('againBtn').addEventListener('click', () => location.reload());

  // ---------- DETECTION (from Stage 1) ----------
  const video = $('video'), overlay = $('overlay');
  const ctx = overlay.getContext('2d');
  window.addEventListener('resize', resizeCanvas);
  function resizeCanvas() {
    overlay.width = overlay.clientWidth;
    overlay.height = overlay.clientHeight;
  }
  function videoToScreen(box, vw, vh, sw, sh) {
    const scale = Math.max(sw / vw, sh / vh);
    const dx = (sw - vw * scale) / 2, dy = (sh - vh * scale) / 2;
    return { x: box[0] * scale + dx, y: box[1] * scale + dy, w: box[2] * scale, h: box[3] * scale };
  }
  async function detectLoop() {
    if (gameOver) return;
    if (model && video.readyState >= 2 && overlay.width > 0) {
      let predictions = [];
      try { predictions = await model.detect(video, 8); } catch (e) {}
      const sw = overlay.width, sh = overlay.height;
      const vw = video.videoWidth || sw, vh = video.videoHeight || sh;
      const cx = sw / 2, cy = sh / 2;
      ctx.clearRect(0, 0, sw, sh);
      locked = false;
      for (const p of predictions) {
        if (p.class !== 'person' || p.score < 0.5) continue;
        const b = videoToScreen(p.bbox, vw, vh, sw, sh);
        const inX = cx >= b.x && cx <= b.x + b.w;
        const inUpper = cy >= b.y && cy <= b.y + b.h * 0.45;
        const isTarget = inX && inUpper;
        if (isTarget) locked = true;
        ctx.lineWidth = 3;
        ctx.strokeStyle = isTarget ? '#16c60c' : 'rgba(255,255,255,0.5)';
        ctx.strokeRect(b.x, b.y, b.w, b.h * 0.45);
      }
      drawCrosshair(cx, cy, locked);
      $('lockLabel').textContent = locked ? 'LOCKED' : 'Searching…';
      $('lockLabel').classList.toggle('locked', locked);
    }
    requestAnimationFrame(detectLoop);
  }
  function drawCrosshair(cx, cy, on) {
    const r = 26, g = 8;
    ctx.strokeStyle = on ? '#16c60c' : 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.moveTo(cx - r - g, cy); ctx.lineTo(cx - g, cy);
    ctx.moveTo(cx + g, cy);     ctx.lineTo(cx + r + g, cy);
    ctx.moveTo(cx, cy - r - g); ctx.lineTo(cx, cy - g);
    ctx.moveTo(cx, cy + g);     ctx.lineTo(cx, cy + r + g);
    ctx.stroke();
  }

  // ---------- SHOOT ----------
  $('shoot').addEventListener('click', async () => {
    if (gameOver) return;
    beep(520, 60); vibrate(20); // trigger feel on every shot
    if (!locked) { centerMsg('miss', '#ffffff'); return; }

    // Stage 2: the target is the other alive player (2-player duel).
    let victimId = null;
    for (const pid in alivePlayers) {
      if (pid !== myId) { victimId = pid; break; }
    }
    if (!victimId) { centerMsg('no enemy', '#ffd166'); return; }

    // Server-side: atomically reduce the victim's energy (never below 0)
    const res = await roomRef.child('players/' + victimId + '/energy')
      .transaction((e) => (e === null || e <= 0) ? e : e - 1);

    if (res.committed && res.snapshot.val() !== null) {
      const newEnergy = res.snapshot.val();
      centerMsg('HIT!', '#16c60c');
      vibrate([40, 30, 40]); beep(880, 90);
      if (newEnergy <= 0) {
        await roomRef.child('players/' + victimId + '/alive').set(false);
        centerMsg('ELIMINATED!', '#ffd166');
      }
    }
  });

  show('home');
})();
</script>
</body>
</html>
