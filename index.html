<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>War Game — Stage 3</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0b0f14; font-family: -apple-system, system-ui, sans-serif; color: #e8eef5; }
  #app { position: fixed; inset: 0; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .hidden { display: none !important; }

  h1 { font-size: 26px; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #9fb0c0; margin-bottom: 20px; max-width: 320px; line-height: 1.5; }

  input, select {
    width: 100%; max-width: 300px; padding: 14px; margin: 6px 0;
    font-size: 17px; border-radius: 12px; border: 1px solid #2a3542;
    background: #141c26; color: #fff; text-align: center;
  }
  input::placeholder { color: #5c6b7a; }

  .btn {
    width: 100%; max-width: 300px; padding: 16px; margin: 8px 0;
    font-size: 17px; font-weight: 700; border: none; border-radius: 14px; cursor: pointer;
  }
  .btn-green { background: #16c60c; color: #001b00; }
  .btn-blue  { background: #2f81f7; color: #fff; }
  .btn-dim   { background: #232e3a; color: #cfd9e3; }
  .btn:disabled { opacity: 0.45; }

  #msg { margin-top: 14px; font-size: 14px; color: #ffd166; min-height: 20px; max-width: 320px; }

  /* Lobby */
  #lobby { justify-content: flex-start; padding-top: 30px; overflow-y: auto; }
  #roomCodeBig { font-size: 40px; font-weight: 800; letter-spacing: 9px; color: #16c60c; margin: 4px 0 10px; }
  .teamPick { display: flex; gap: 10px; width: 100%; max-width: 320px; margin: 4px 0 10px; }
  .teamBtn {
    flex: 1; padding: 12px 6px; border-radius: 14px; border: 3px solid transparent;
    font-size: 15px; font-weight: 800; cursor: pointer; color: #fff;
  }
  #redBtn  { background: #7a1420; }
  #blueBtn { background: #143a7a; }
  #redBtn.mine  { border-color: #ff4d4d; background: #b01e2e; }
  #blueBtn.mine { border-color: #6ea8ff; background: #1e56b0; }
  .teamCols { display: flex; gap: 10px; width: 100%; max-width: 320px; margin-bottom: 8px; }
  .teamCol { flex: 1; background: #141c26; border-radius: 12px; padding: 10px; min-height: 70px; }
  .teamCol h3 { font-size: 13px; margin-bottom: 6px; }
  .teamCol div { font-size: 14px; line-height: 1.8; }
  #redCol h3 { color: #ff6b6b; } #blueCol h3 { color: #6ea8ff; }

  .settingRow { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 5px 0; width: 100%; max-width: 320px; }
  .settingRow label { font-size: 14px; color: #9fb0c0; text-align: left; }
  .settingRow select { width: 150px; margin: 0; padding: 10px; font-size: 15px; }

  #lobbyMsg { margin-top: 8px; font-size: 14px; color: #ffd166; min-height: 20px; }

  /* Game screen */
  #game { padding: 0; display: block; }
  video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #overlay { pointer-events: none; }
  #flash { position: absolute; inset: 0; background: #ff2b2b; opacity: 0; pointer-events: none; transition: opacity 0.15s ease-out; }
  #flash.show { opacity: 0.55; transition: none; }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  #teamChip { padding: 5px 10px; border-radius: 20px; font-size: 13px; font-weight: 800; }
  #teamChip.red  { background: #b01e2e; } #teamChip.blue { background: #1e56b0; }
  #energyWrap { flex: 1; }
  #energyLabel { font-size: 11px; font-weight: 700; margin-bottom: 3px; }
  #energyBar { height: 13px; border-radius: 8px; background: rgba(0,0,0,0.5); overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
  #energyFill { height: 100%; width: 100%; background: linear-gradient(to right, #16c60c, #7ee81a); transition: width 0.3s; }
  #lockLabel { padding: 5px 11px; border-radius: 20px; background: rgba(0,0,0,0.45); font-size: 13px; font-weight: 700; }
  #lockLabel.locked { background: #16c60c; color: #001b00; }
  #gpsChip {
    position: absolute; top: 62px; right: 12px; z-index: 5;
    padding: 4px 10px; border-radius: 14px; background: rgba(0,0,0,0.45);
    font-size: 11px; font-weight: 700; color: #ffd166;
  }
  #gpsChip.ok { color: #7ee81a; }

  #centerMsg {
    position: absolute; top: 30%; left: 0; right: 0; z-index: 6;
    text-align: center; font-size: 54px; font-weight: 800; color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9); opacity: 0; transition: opacity 0.3s;
  }
  #centerMsg.show { opacity: 1; transition: none; }

  #shoot {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 7;
    width: 96px; height: 96px; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #ff6b6b, #d31027);
    border: 5px solid rgba(255,255,255,0.85); box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    color: #fff; font-size: 17px; font-weight: 800; letter-spacing: 1px; cursor: pointer; user-select: none;
  }
  #shoot:active { transform: translateX(-50%) scale(0.92); }

  #mapBtn {
    position: absolute; bottom: 52px; left: 22px; z-index: 7;
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(20,28,38,0.9); border: 3px solid rgba(255,255,255,0.7);
    color: #fff; font-size: 13px; font-weight: 800; cursor: pointer;
  }

  /* Map overlay */
  #mapOverlay { position: absolute; inset: 0; z-index: 10; background: #0b0f14; }
  /* z-index 0 keeps the map's internal layers from covering our buttons */
  #mapDiv { position: absolute; inset: 0; z-index: 0; }
  #mapClose {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1100;
    padding: 18px 34px; border-radius: 30px; border: 3px solid rgba(255,255,255,0.9);
    background: #d31027; color: #fff; font-size: 17px; font-weight: 800; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  }
  #mapLegend {
    position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1100;
    padding: 8px 12px; border-radius: 12px; background: rgba(11,15,20,0.85);
    font-size: 12px; line-height: 1.6; text-align: left;
  }

  #endTitle { font-size: 40px; font-weight: 800; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="home" class="screen">
    <h1>🔫 War Game</h1>
    <p class="sub">Your phone is the gun.</p>
    <input id="nameInput" maxlength="12" placeholder="Your name" />

    <div style="width:100%;max-width:300px;background:#141c26;border-radius:14px;padding:12px;margin:10px 0">
      <div style="font-size:13px;color:#9fb0c0;margin-bottom:4px">Got a code from a friend? Join their game:</div>
      <input id="codeInput" maxlength="4" placeholder="4-letter code" style="text-transform:uppercase" />
      <button id="joinBtn" class="btn btn-blue" style="margin-bottom:0">Join Game</button>
    </div>

    <div style="font-size:13px;color:#5c6b7a;margin:4px 0">— or —</div>
    <button id="createBtn" class="btn btn-dim">Start a NEW game (become host)</button>

    <div id="msg"></div>
    <div style="margin-top:14px;font-size:12px;color:#5c6b7a">version 3.3 — both phones must show the same version</div>
  </div>

  <!-- LOBBY -->
  <div id="lobby" class="screen hidden">
    <h1>Game Lobby</h1>
    <div id="roomCodeBig">----</div>
    <p class="sub" style="margin-bottom:8px">Pick your team:</p>
    <div class="teamPick">
      <button id="redBtn" class="teamBtn">🔴 RED</button>
      <button id="blueBtn" class="teamBtn">🔵 BLUE</button>
    </div>
    <div class="teamCols">
      <div class="teamCol" id="redCol"><h3>RED TEAM</h3><div id="redList"></div></div>
      <div class="teamCol" id="blueCol"><h3>BLUE TEAM</h3><div id="blueList"></div></div>
    </div>
    <div id="hostSettings" style="width:100%;max-width:320px">
      <div class="settingRow">
        <label>Hits to eliminate</label>
        <select id="energySelect">
          <option value="3">3</option><option value="5" selected>5</option><option value="10">10</option>
        </select>
      </div>
      <div class="settingRow">
        <label>Space / range</label>
        <select id="rangeSelect">
          <option value="8">Indoor (8m)</option>
          <option value="15" selected>Office (15m)</option>
          <option value="25">Outdoor (25m)</option>
        </select>
      </div>
      <div class="settingRow">
        <label>Enemies on map</label>
        <select id="visSelect">
          <option value="hidden" selected>Hidden (hard)</option>
          <option value="flash">Only when near</option>
          <option value="visible">Always visible</option>
        </select>
      </div>
    </div>
    <div id="myTeamLine" style="font-size:14px;font-weight:700;margin:4px 0"></div>
    <button id="readyBtn" class="btn btn-blue">Enable GPS + Camera (get ready)</button>
    <div id="lobbyGps" style="font-size:13px;min-height:18px"></div>
    <button id="gpsRetry" class="btn btn-dim hidden" style="padding:12px">📍 Retry GPS</button>
    <button id="startGameBtn" class="btn btn-green" disabled>Start Game</button>
    <div id="lobbyMsg"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen hidden">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
    <div id="hud">
      <span id="teamChip">RED</span>
      <div id="energyWrap">
        <div id="energyLabel">ENERGY</div>
        <div id="energyBar"><div id="energyFill"></div></div>
      </div>
      <span id="lockLabel">Searching…</span>
    </div>
    <div id="gpsChip">GPS…</div>
    <div id="centerMsg"></div>
    <button id="mapBtn">MAP</button>
    <button id="shoot">SHOOT</button>
    <div id="mapOverlay" class="hidden">
      <div id="mapDiv"></div>
      <div id="mapLegend"></div>
      <button id="mapClose">🔫 BACK TO SHOOTING</button>
    </div>
  </div>

  <!-- END -->
  <div id="end" class="screen hidden">
    <div id="endTitle"></div>
    <p class="sub" id="endSub"></p>
    <button id="againBtn" class="btn btn-green">Back to Home</button>
  </div>

</div>

<!-- Firebase (free server) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<!-- On-device AI person detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<!-- Map -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCN0gXH8OlCrK1WgHZ3tx45gj8uQFaCfSg",
  authDomain: "iwar-game.firebaseapp.com",
  databaseURL: "https://iwar-game-default-rtdb.firebaseio.com",
  projectId: "iwar-game",
  storageBucket: "iwar-game.firebasestorage.app",
  messagingSenderId: "643951740494",
  appId: "1:643951740494:web:c8c6899189e7afbe6e251f"
};

(function () {
  const $ = (id) => document.getElementById(id);
  const screens = { home: $('home'), lobby: $('lobby'), game: $('game'), end: $('end') };
  function show(name) {
    for (const k in screens) screens[k].classList.toggle('hidden', k !== name);
  }

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ---------- state ----------
  const myId = 'p_' + Math.random().toString(36).slice(2, 10);
  let myName = '', myTeam = null, roomCode = '', isHost = false;
  let roomRef = null, model = null;
  let cameraReady = false, locked = false, gameOver = false;
  let myEnergy = null, maxEnergy = 5, weaponRange = 15, visMode = 'hidden';
  let players = {};          // full player map from server
  let lastMe = null;         // my latest server state, for re-registering after a disconnect
  let myPos = null;          // {lat, lng, acc}
  let lastPosWrite = 0;
  let audioCtx = null;
  const GPS_BUFFER = 10;     // extra meters of forgiveness for GPS error

  // ---------- feedback ----------
  function beep(freq, durMs, type) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.25, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durMs / 1000);
      o.start(); o.stop(audioCtx.currentTime + durMs / 1000);
    } catch (e) {}
  }
  function vibrate(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
  function centerMsg(text, color) {
    const el = $('centerMsg');
    el.textContent = text; el.style.color = color;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 650);
  }
  function redFlash() {
    $('flash').classList.add('show');
    setTimeout(() => $('flash').classList.remove('show'), 160);
  }

  // ---------- distance ----------
  function metersBetween(a, b) {
    const R = 6371000, rad = Math.PI / 180;
    const dLat = (b.lat - a.lat) * rad, dLng = (b.lng - a.lng) * rad;
    const s = Math.sin(dLat / 2) ** 2 +
      Math.cos(a.lat * rad) * Math.cos(b.lat * rad) * Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(s));
  }

  // ---------- HOME ----------
  function makeCode() {
    const letters = 'ABCDEFGHJKMNPQRSTUVWXYZ';
    let c = '';
    for (let i = 0; i < 4; i++) c += letters[Math.floor(Math.random() * letters.length)];
    return c;
  }
  function withTimeout(promise) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(
        () => reject(new Error('no response from server')), 8000))
    ]);
  }

  $('createBtn').addEventListener('click', async () => {
    myName = $('nameInput').value.trim();
    if (!myName) { $('msg').textContent = 'Please enter your name first.'; return; }
    if ($('codeInput').value.trim()) {
      $('msg').textContent = '⚠️ You typed a game code — press "Join Game" above instead. (Or clear the code box to start a NEW game.)';
      return;
    }
    $('msg').textContent = 'Creating game…';
    try {
      roomCode = makeCode(); isHost = true;
      roomRef = db.ref('rooms/' + roomCode);
      await withTimeout(roomRef.set({
        created: Date.now(), hostId: myId, status: 'lobby',
        settings: { energy: 5, range: 15, vis: 'hidden' }, players: {}
      }));
      await joinRoom();
      $('msg').textContent = '';
    } catch (err) {
      $('msg').textContent = '❌ ' + (err && err.message ? err.message : err);
    }
  });

  $('joinBtn').addEventListener('click', async () => {
    myName = $('nameInput').value.trim();
    const code = $('codeInput').value.trim().toUpperCase();
    if (!myName) { $('msg').textContent = 'Please enter your name first.'; return; }
    if (code.length !== 4) { $('msg').textContent = 'Enter the 4-letter game code.'; return; }
    $('msg').textContent = 'Joining game…';
    try {
      roomCode = code; isHost = false;
      roomRef = db.ref('rooms/' + roomCode);
      const snap = await withTimeout(roomRef.get());
      if (!snap.exists()) { $('msg').textContent = 'Game "' + code + '" not found.'; return; }
      if (snap.val().status !== 'lobby') { $('msg').textContent = 'That game already started.'; return; }
      await joinRoom();
      $('msg').textContent = '';
    } catch (err) {
      $('msg').textContent = '❌ ' + (err && err.message ? err.message : err);
    }
  });

  async function joinRoom() {
    // auto-assign to the smaller team (player can switch in the lobby)
    const snap = await roomRef.child('players').get();
    let red = 0, blue = 0;
    snap.forEach((p) => { (p.val().team === 'red') ? red++ : blue++; });
    myTeam = red <= blue ? 'red' : 'blue';
    await roomRef.child('players/' + myId).set({
      name: myName, team: myTeam, energy: -1, alive: true
    });
    roomRef.child('players/' + myId).onDisconnect().remove();

    // If the phone sleeps or the player switches apps, the server removes them.
    // When the connection comes back, automatically re-register with the last
    // known state so nobody vanishes from the game.
    db.ref('.info/connected').on('value', (s) => {
      if (s.val() === true && roomRef) {
        const meRef = roomRef.child('players/' + myId);
        meRef.set(lastMe || { name: myName, team: myTeam, energy: -1, alive: true });
        meRef.onDisconnect().remove();
      }
    });

    $('roomCodeBig').textContent = roomCode;
    $('hostSettings').style.display = isHost ? 'block' : 'none';
    $('startGameBtn').style.display = isHost ? 'block' : 'none';
    show('lobby');
    listenToRoom();
    loadModel();
  }

  // ---------- LOBBY ----------
  $('redBtn').addEventListener('click', () => setTeam('red'));
  $('blueBtn').addEventListener('click', () => setTeam('blue'));
  function setTeam(team) {
    myTeam = team;
    roomRef.child('players/' + myId + '/team').set(team);
  }

  function pushSettings() {
    if (!isHost) return;
    roomRef.child('settings').set({
      energy: parseInt($('energySelect').value, 10),
      range: parseInt($('rangeSelect').value, 10),
      vis: $('visSelect').value
    });
  }
  $('energySelect').addEventListener('change', pushSettings);
  $('rangeSelect').addEventListener('change', pushSettings);
  $('visSelect').addEventListener('change', pushSettings);

  $('readyBtn').addEventListener('click', async () => {
    $('readyBtn').disabled = true;
    // GPS FIRST — on iPhone the location prompt only appears reliably when
    // requested directly from the button tap, before the camera prompt.
    startGPS();
    $('lobbyMsg').textContent = 'Requesting camera…';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      $('video').srcObject = stream;
      await $('video').play();
      cameraReady = true;
    } catch (e) {
      $('lobbyMsg').textContent = '❌ Camera blocked — allow camera access and try again.';
      $('readyBtn').disabled = false;
      return;
    }
    $('readyBtn').textContent = '✅ Camera ready';
    $('lobbyMsg').textContent = model ? 'Ready! Waiting for game to start…' : 'Loading AI…';
    if (audioCtx === null) beep(1, 1, 'sine'); // unlock audio on user gesture
    updateStartButton();
  });

  function setGpsStatus(text, ok) {
    $('gpsChip').textContent = text;
    $('gpsChip').classList.toggle('ok', !!ok);
    $('lobbyGps').textContent = 'GPS: ' + text;
    $('lobbyGps').style.color = ok ? '#7ee81a' : '#ffd166';
  }

  function startGPS() {
    if (!navigator.geolocation) { setGpsStatus('not supported on this phone', false); return; }
    setGpsStatus('asking permission…', false);
    navigator.geolocation.watchPosition(
      (p) => {
        myPos = { lat: p.coords.latitude, lng: p.coords.longitude, acc: Math.round(p.coords.accuracy) };
        setGpsStatus('OK ±' + myPos.acc + 'm', myPos.acc <= 25);
        const now = Date.now();
        if (roomRef && now - lastPosWrite > 2000) {   // write at most every 2s
          lastPosWrite = now;
          roomRef.child('players/' + myId + '/pos').set(myPos);
        }
      },
      (err) => {
        if (err && err.code === 1) {
          setGpsStatus('BLOCKED', false);
          $('lobbyMsg').textContent = '❌ Location blocked. iPhone: 1) Settings → Privacy & Security → Location Services → ON, and same page → Safari Websites → "While Using the App". 2) In Safari tap the "aA" (or ⚙) icon in the address bar → Website Settings → Location → Allow. Then press Retry GPS.';
          $('gpsRetry').classList.remove('hidden');
        } else {
          setGpsStatus('no signal yet…', false);
        }
      },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
    );
  }

  $('gpsRetry').addEventListener('click', () => {
    $('gpsRetry').classList.add('hidden');
    $('lobbyMsg').textContent = '';
    startGPS();
  });
  // tapping the GPS chip during the game also retries
  $('gpsChip').addEventListener('click', startGPS);

  async function loadModel() {
    if (model) return;
    try {
      model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
      if (cameraReady) $('lobbyMsg').textContent = 'Ready! Waiting for game to start…';
      updateStartButton();
    } catch (e) {
      $('lobbyMsg').textContent = '❌ AI failed to load — check internet, then reload.';
    }
  }

  function updateStartButton() {
    if (!isHost) return;
    let red = 0, blue = 0, count = 0;
    for (const pid in players) { count++; (players[pid].team === 'red') ? red++ : blue++; }
    const btn = $('startGameBtn');
    if (!cameraReady || !model) { btn.disabled = true; btn.textContent = 'Start Game (press "get ready" first)'; return; }
    if (count < 2)              { btn.disabled = true; btn.textContent = 'Start Game (waiting for players…)'; return; }
    if (red < 1 || blue < 1)    { btn.disabled = true; btn.textContent = 'Start Game (need a player on each team)'; return; }
    btn.disabled = false; btn.textContent = 'Start Game';
  }

  $('startGameBtn').addEventListener('click', async () => {
    const snap = await roomRef.child('players').get();
    const energy = parseInt($('energySelect').value, 10);
    const updates = { status: 'playing' };
    snap.forEach((p) => { updates['players/' + p.key + '/energy'] = energy; });
    await roomRef.update(updates);
  });

  // ---------- ROOM LISTENER ----------
  function listenToRoom() {
    roomRef.on('value', (snap) => {
      const room = snap.val();
      if (!room) return;
      const s = room.settings || {};
      maxEnergy = s.energy || 5;
      weaponRange = s.range || 15;
      visMode = s.vis || 'hidden';
      if (!isHost) {
        $('energySelect').value = String(maxEnergy);
        $('rangeSelect').value = String(weaponRange);
        $('visSelect').value = visMode;
      }
      players = room.players || {};

      // lobby team lists
      const redNames = [], blueNames = [];
      for (const pid in players) {
        const p = players[pid];
        let label = p.name + (pid === myId ? ' (you)' : '') + (pid === room.hostId ? ' 👑' : '');
        (p.team === 'red' ? redNames : blueNames).push(label);
      }
      $('redList').innerHTML = redNames.join('<br>') || '—';
      $('blueList').innerHTML = blueNames.join('<br>') || '—';
      const me = players[myId];
      if (me) {
        lastMe = me;
        myTeam = me.team;
        $('redBtn').classList.toggle('mine', myTeam === 'red');
        $('blueBtn').classList.toggle('mine', myTeam === 'blue');
        $('myTeamLine').textContent = 'You are on the ' + (myTeam === 'red' ? '🔴 RED' : '🔵 BLUE') + ' team (tap a button above to switch)';
        $('myTeamLine').style.color = myTeam === 'red' ? '#ff6b6b' : '#6ea8ff';
      }
      updateStartButton();

      // damage feedback + energy bar
      if (me && room.status === 'playing') {
        if (myEnergy !== null && me.energy < myEnergy && me.energy >= 0) {
          redFlash(); vibrate([80, 40, 80]); beep(200, 200, 'sawtooth');
          centerMsg('-' + (myEnergy - me.energy) + ' HIT!', '#ff4d4d');
        }
        myEnergy = me.energy;
        const pct = Math.max(0, (me.energy / maxEnergy) * 100);
        $('energyFill').style.width = pct + '%';
        $('energyFill').style.background = pct > 40
          ? 'linear-gradient(to right,#16c60c,#7ee81a)'
          : 'linear-gradient(to right,#e8590c,#ff2b2b)';
      }

      if (room.status === 'playing' && !gameOver) {
        if (me && me.energy === 0) {
          endGame('☠️ ELIMINATED', 'You ran out of energy. Watch the map and cheer your team!');
          return;
        }
        if (screens.game.classList.contains('hidden')) {
          $('teamChip').textContent = (myTeam || '').toUpperCase();
          $('teamChip').className = myTeam;
          $('teamChip').id = 'teamChip';
          show('game');
          resizeCanvas();
          detectLoop();
        }
        updateMapMarkers();

        // team victory: only one team has alive players left
        const aliveTeams = {};
        let total = 0;
        for (const pid in players) {
          total++;
          const p = players[pid];
          if (p.alive && p.energy !== 0) aliveTeams[p.team] = true;
        }
        const teamsLeft = Object.keys(aliveTeams);
        if (total >= 2 && teamsLeft.length === 1) {
          const winner = teamsLeft[0];
          if (winner === myTeam) {
            endGame('🏆 ' + winner.toUpperCase() + ' TEAM WINS!', 'Your team is the last one standing!');
          } else {
            endGame('💥 ' + winner.toUpperCase() + ' TEAM WINS', 'Your team was eliminated. Rematch?');
          }
        }
      }
    });
  }

  function endGame(title, sub) {
    gameOver = true;
    $('endTitle').textContent = title;
    $('endSub').textContent = sub;
    show('end');
    if (title.indexOf('🏆') >= 0) { beep(660, 150); setTimeout(() => beep(880, 250), 160); }
    else { vibrate([200, 100, 200]); beep(150, 500, 'sawtooth'); }
  }
  $('againBtn').addEventListener('click', () => location.reload());

  // ---------- MAP ----------
  let map = null;
  const markers = {};   // pid -> Leaflet circleMarker

  $('mapBtn').addEventListener('click', () => {
    $('mapOverlay').classList.remove('hidden');
    if (!map) {
      map = L.map('mapDiv', { zoomControl: false });
      L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19, attribution: '© OpenStreetMap'
      }).addTo(map);
      map.setView(myPos ? [myPos.lat, myPos.lng] : [0, 0], myPos ? 18 : 2);
    }
    setTimeout(() => { map.invalidateSize(); if (myPos) map.setView([myPos.lat, myPos.lng], 18); }, 100);
    updateMapMarkers();
  });
  $('mapClose').addEventListener('click', () => $('mapOverlay').classList.add('hidden'));

  function updateMapMarkers() {
    if (!map) return;
    const nearLimit = weaponRange * 1.5;
    const seen = {};
    let legend = '🔵🔴 You + teammates always shown. ';
    if (visMode === 'hidden') legend += 'Enemies: HIDDEN — use your eyes!';
    if (visMode === 'flash') legend += 'Enemies: shown only within ' + Math.round(nearLimit) + 'm.';
    if (visMode === 'visible') legend += 'Enemies: always shown.';
    $('mapLegend').textContent = legend;

    for (const pid in players) {
      const p = players[pid];
      if (!p.pos || !(p.alive && p.energy !== 0)) continue;
      let visible = false;
      if (pid === myId || p.team === myTeam) visible = true;
      else if (visMode === 'visible') visible = true;
      else if (visMode === 'flash' && myPos && metersBetween(myPos, p.pos) <= nearLimit) visible = true;
      if (!visible) continue;

      seen[pid] = true;
      const color = p.team === 'red' ? '#ff4d4d' : '#2f81f7';
      if (!markers[pid]) {
        markers[pid] = L.circleMarker([p.pos.lat, p.pos.lng], {
          radius: pid === myId ? 10 : 8, color: '#fff', weight: 2,
          fillColor: color, fillOpacity: 1
        }).addTo(map).bindTooltip(p.name, { permanent: true, direction: 'top', offset: [0, -10] });
      } else {
        markers[pid].setLatLng([p.pos.lat, p.pos.lng]);
      }
    }
    for (const pid in markers) {
      if (!seen[pid]) { map.removeLayer(markers[pid]); delete markers[pid]; }
    }
  }

  // ---------- DETECTION ----------
  const video = $('video'), overlay = $('overlay');
  const ctx = overlay.getContext('2d');
  window.addEventListener('resize', resizeCanvas);
  function resizeCanvas() {
    overlay.width = overlay.clientWidth;
    overlay.height = overlay.clientHeight;
  }
  function videoToScreen(box, vw, vh, sw, sh) {
    const scale = Math.max(sw / vw, sh / vh);
    const dx = (sw - vw * scale) / 2, dy = (sh - vh * scale) / 2;
    return { x: box[0] * scale + dx, y: box[1] * scale + dy, w: box[2] * scale, h: box[3] * scale };
  }
  async function detectLoop() {
    if (gameOver) return;
    if (model && video.readyState >= 2 && overlay.width > 0) {
      let predictions = [];
      try { predictions = await model.detect(video, 8); } catch (e) {}
      const sw = overlay.width, sh = overlay.height;
      const vw = video.videoWidth || sw, vh = video.videoHeight || sh;
      const cx = sw / 2, cy = sh / 2;
      ctx.clearRect(0, 0, sw, sh);
      locked = false;
      for (const p of predictions) {
        if (p.class !== 'person' || p.score < 0.5) continue;
        const b = videoToScreen(p.bbox, vw, vh, sw, sh);
        const inX = cx >= b.x && cx <= b.x + b.w;
        const inUpper = cy >= b.y && cy <= b.y + b.h * 0.45;
        const isTarget = inX && inUpper;
        if (isTarget) locked = true;
        ctx.lineWidth = 3;
        ctx.strokeStyle = isTarget ? '#16c60c' : 'rgba(255,255,255,0.5)';
        ctx.strokeRect(b.x, b.y, b.w, b.h * 0.45);
      }
      drawCrosshair(cx, cy, locked);
      $('lockLabel').textContent = locked ? 'LOCKED' : 'Searching…';
      $('lockLabel').classList.toggle('locked', locked);
    }
    requestAnimationFrame(detectLoop);
  }
  function drawCrosshair(cx, cy, on) {
    const r = 26, g = 8;
    ctx.strokeStyle = on ? '#16c60c' : 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.moveTo(cx - r - g, cy); ctx.lineTo(cx - g, cy);
    ctx.moveTo(cx + g, cy);     ctx.lineTo(cx + r + g, cy);
    ctx.moveTo(cx, cy - r - g); ctx.lineTo(cx, cy - g);
    ctx.moveTo(cx, cy + g);     ctx.lineTo(cx, cy + r + g);
    ctx.stroke();
  }

  // ---------- SHOOT ----------
  $('shoot').addEventListener('click', async () => {
    if (gameOver) return;
    beep(520, 60); vibrate(20);
    if (!locked) { centerMsg('miss', '#ffffff'); return; }

    // candidates: alive players on the OTHER team
    let victimId = null, victimDist = Infinity, victimAllowed = 0;
    for (const pid in players) {
      if (pid === myId) continue;
      const p = players[pid];
      if (!(p.alive && p.energy !== 0)) continue;
      if (p.team === myTeam) continue;              // never hit teammates
      let d = 0, allowed = weaponRange + GPS_BUFFER;
      if (myPos && p.pos) {
        d = metersBetween(myPos, p.pos);
        // GPS on both phones drifts — widen the allowed range by both phones'
        // reported error so fuzzy GPS never unfairly blocks a real close-range hit
        allowed += Math.min(40, (myPos.acc || 0) + (p.pos.acc || 0));
      }
      if (d < victimDist) { victimDist = d; victimId = pid; victimAllowed = allowed; }
    }
    if (!victimId) { centerMsg('no enemy', '#ffd166'); return; }
    if (victimDist > victimAllowed) {
      centerMsg('OUT OF RANGE (~' + Math.round(victimDist) + 'm)', '#ffd166');
      return;
    }

    const res = await roomRef.child('players/' + victimId + '/energy')
      .transaction((e) => (e === null || e <= 0) ? e : e - 1);

    if (res.committed && res.snapshot.val() !== null) {
      const newEnergy = res.snapshot.val();
      centerMsg('HIT!', '#16c60c');
      vibrate([40, 30, 40]); beep(880, 90);
      if (newEnergy <= 0) {
        await roomRef.child('players/' + victimId + '/alive').set(false);
        centerMsg('ELIMINATED!', '#ffd166');
      }
    }
  });

  show('home');
})();
</script>
</body>
</html>
